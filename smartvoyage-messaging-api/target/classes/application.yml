server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/smart_voyage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  upload:
    base-dir: uploads
    audio-dir: uploads/audio
  anti-spam:
    max-messages: 5
    window-seconds: 10
    duplicate-window-seconds: 20
    bad-words: scam,fraud,abuse,insult
  notification:
    batch-delay-ms: 3000
  twilio:
    enabled: false
    account-sid: ""
    auth-token: ""
    from-number: ""
    whatsapp-from: "whatsapp:+14155238886"
